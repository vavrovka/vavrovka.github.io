<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program – Petra & Michal 💍</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💍</text></svg>">
    <style>
        @font-face {
            font-family: 'CustomFont';
            src: url('font.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a10;
            font-family: 'CustomFont', cursive;
        }

        /* Center and maintain the 2:3 aspect ratio of mapka4.png (1024×1536) - portrait */
        .map-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-container {
            position: relative;
            width: min(100vw, 66.6667vh);
            height: min(100vh, 150vw);
            flex-shrink: 0;
        }

        .map-bg {
            width: 100%;
            height: 100%;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        /* SVG overlay for dots and lines */
        .svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: visible;
        }

        /* Invisible hotspot areas */
        .hotspot {
            position: absolute;
            cursor: crosshair;
            z-index: 10;
            /* Uncomment to debug bounding boxes: */
            /* background: rgba(255, 0, 0, 0.15); border: 1px dashed red; */
        }

        /* Pulsing rings on SVG */
        .svg-pulse {
            animation: pulse 2.5s ease-in-out infinite;
            transform-origin: center;
        }

        @keyframes pulse {
            0%   { opacity: 0.7; r: 12; }
            50%  { opacity: 0.2; r: 24; }
            100% { opacity: 0.7; r: 12; }
        }

        /* Schedule popup panels at the bottom */
        .schedule-popup {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translateX(-50%);
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 1vmin 1.5vmin;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.28s ease, transform 0.28s ease;
            min-width: 15vmin;
            max-width: 99%;
            box-shadow: none;
            z-index: 20;
            font-family: 'CustomFont', cursive;
            text-align: center;
        }

        .schedule-popup.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0.5vmin);
        }

        .schedule-popup h3 {
            color: #4a6020;
            font-size: 4.6vmin;
            font-weight: 700;
            margin-bottom: 1vmin;
            padding-bottom: 0.5vmin;
            border-bottom: none;
            letter-spacing: 0.02em;
        }

        .schedule-popup p {
            color: #3a4a18;
            font-size: 4.0vmin;
            line-height: 1.6;
            letter-spacing: 0.01em;
            margin-bottom: 0.5vmin;
        }

        /* SVG visual elements */
        .svg-dot {
            opacity: 1;
        }

        .svg-line {
            opacity: 0;
            pointer-events: none;
        }

        /* Switch icon */
        .switch-icon {
            position: fixed;
            top: 2vmin;
            right: 2vmin;
            width: 8vmin;
            height: 8vmin;
            background: rgba(112, 130, 56, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .switch-icon:hover {
            background: rgba(112, 130, 56, 1);
            transform: scale(1.1);
        }

        .switch-icon svg {
            width: 5vmin;
            height: 5vmin;
            fill: #fffff0;
        }
    </style>
</head>
<body>

<!-- Switch to landscape version -->
<a href="indexpc.html" class="switch-icon" title="Přepnout na PC verzi">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="2" y1="17" x2="22" y2="17" stroke="currentColor" stroke-width="2"/>
        <path d="M 9 21 L 15 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
</a>

<div class="map-wrapper">
    <div class="map-container" id="mapContainer">

        <!-- The map image - portrait version -->
        <img src="mapka4.png" class="map-bg" alt="Mapa areálu" draggable="false">

        <!-- SVG overlay – dynamically populated by JavaScript -->
        <svg class="svg-overlay"
             viewBox="0 0 1024 1536"
             preserveAspectRatio="none"
             id="svgOverlay"
             aria-hidden="true">
        </svg>

        <!-- Hotspot divs and popup panels – dynamically populated by JavaScript -->

    </div><!-- .map-container -->
</div><!-- .map-wrapper -->

<script>
    // ============================================================================

    // ============================================================================
    const IMAGE_WIDTH = 1024;
    const IMAGE_HEIGHT = 1536;
    const LINE_END_Y = 1100;  // Bottom anchor for lines

    const HOTSPOTS = [

                '20:05 Odjezd taxi',
                '22:05 Odjezd taxi',
                '24:05 Odjezd taxi',
                '03:00 Rozvoz opozdilců'
            ]
        },
        {
            bbox: { xMin: 530, xMax: 580, yMin: 540, yMax: 580 },
            title: 'Uvítací louka',
            schedule: [
                '13:00 Výdej myrty',
                '13:50 Konec výdeje',
                '15:00 Ztráty a nálezy',
                '20:00 Taxi stanoviště',
                '22:00 Taxi stanoviště',
                '24:00 Taxi stanoviště',

            ]
        },
        {
            bbox: { xMin: 570, xMax: 670, yMin: 600, yMax: 700 },
            title: 'Obřadní louka',
            schedule: [
                '13:30 Předobřadní napětí',
                '14:00 Obřad',
                '14:30 Focení',
                '15:00 Přípitek',
                '21:00 Západ slunce',
                '6:00 Východ slunce',
            ]
        },
        {
            bbox: { xMin: 550, xMax: 580, yMin:480, yMax: 500 },
            title: 'Bar',
            schedule: [
                '13:00 Prosecco',
                '15:00 Víno',
                '16:00 Pivo',
                '18:00 Grilované maso',
                '20:00 Pizza',
                '22:00 Koktejl'
            ]
        },
        {
            bbox: { xMin: 600, xMax: 640, yMin: 430, yMax: 460 },
            title: 'Kantýna',
            schedule: [
                '13:00 Kanapky',
                '13:30 Saláty',
                '16:00 Káva a zákusky',
                '17:30 Koláče',
                '18:30 Dezerty',
                '22:00 Pulnoční guláš'
            ]
        },
        {
            bbox: { xMin: 600, xMax: 640, yMin: 270, yMax: 350 },
            title: 'Odpočinková louka',
            schedule: [
                '15:00 Lenošení',

                '18:00 Opalování',
                '20:00 Malování',

            ]
        },
        {
            bbox: { xMin: 650, xMax: 700, yMin: 380, yMax: 420 },
            title: 'Společná louka',
            schedule: [
                '13:00 Kávička',
                '15:00 Pokec',
                '16:00 Něco z grilu',
                '17:00 Pub quiz',

                '21:00 Drink'
            ]
        },
        {
            bbox: { xMin: 460, xMax: 490, yMin: 370, yMax: 410 },
            title: 'Sportovní louka',
            schedule: [
                '15:00 Turnaj v beach volejbalu',
                '16:00 Turnaj ve fotbale',
                '17:00 Turnaj v badmintonu',
                '18:00 Turnaj v pétanque',
                '19:00 Turnaj v vybíjené',
                '20:00 Turnaj v pingpongu'
            ]
        },
        {
            bbox: { xMin: 320, xMax: 510, yMin: 720, yMax: 800 },
            title: 'Dětská louka',
            schedule: [
                '13:00 Házení',
                '15:00 Běhání',
                '16:00 Skákání',
                '17:00 Protahování',
                '18:00 Dovádění',
                '19:00 Skotačení'
            ]
        },
        {
            bbox: { xMin: 540, xMax: 580, yMin: 400, yMax: 440 },
            title: 'Hudba',
            schedule: [
                '17:30 Nevěstina kapela',
                '18:30 Ženichova kapela',
                '19:30 Jam session',
                '20:30 Karakoke party',
                '22:30 Taneční rej',
                '6:30 Východ slunce',

            ]
        },
        {
            bbox: { xMin: 600, xMax: 660, yMin:490, yMax: 520 },
            title: 'Ohňová louka',
            schedule: [
                '13:00 Vyprávění',
                '15:00 Posedávání',

                '22:00 Zpěv'
            ]
        },
        {
            bbox: { xMin: 740, xMax: 770, yMin: 440, yMax: 480 },
            title: 'Stanová louka',
            schedule: [
                '12:00 Stavění stanů',
                '13:00 Foukání karimatky',
                '20:00 Hledání stanu',
                '24:00 Foukání karimatky',
                '20:00 Marná snaha usnout',
                '6:00 Východ slunce'
            ]
        },


        {
            bbox: { xMin: 200, xMax: 310, yMin: 120, yMax: 320 },
            title: 'Les',
            schedule: [
                '12:00 Rozjímání',
                '15:00 Běhání',
                '17:00 Stavba příbytku',
                '19:00 Snění',
                '21:00 Západ slunce',
                '23:00 Noční souznění'
            ]
        },

        {
            bbox: { xMin: 100, xMax: 210, yMin: 340, yMax: 420 },
            title: 'Rybník',
            schedule: [
                '15:00 Koupání',
                '16:00 Opalování',
                '17:00 Potápění',
                '19:00 Osušování',
                '21:00 Lenošení',
                '22:30 Noční koupání'
            ]
        },
    ];

    // ============================================================================
    // INITIALIZATION - Generate all elements from configuration
    // ============================================================================
    const svgOverlay = document.getElementById('svgOverlay');
    const mapContainer = document.getElementById('mapContainer');
    const SVG_NS = 'http://www.w3.org/2000/svg';

    HOTSPOTS.forEach((hotspot, index) => {
        const id = index + 1;
        const bbox = hotspot.bbox;
        
        // Calculate center coordinates
        const cx = (bbox.xMin + bbox.xMax) / 2;
        const cy = (bbox.yMin + bbox.yMax) / 2;
        
        // Calculate percentages for hotspot div positioning
        const leftPct = (bbox.xMin / IMAGE_WIDTH) * 100;
        const topPct = (bbox.yMin / IMAGE_HEIGHT) * 100;
        const widthPct = ((bbox.xMax - bbox.xMin) / IMAGE_WIDTH) * 100;
        const heightPct = ((bbox.yMax - bbox.yMin) / IMAGE_HEIGHT) * 100;
        
        // ---- Create SVG Elements ----
        
        // Pulsing circle
        const pulse = document.createElementNS(SVG_NS, 'circle');
        pulse.setAttribute('class', 'svg-pulse');
        pulse.setAttribute('cx', cx);
        pulse.setAttribute('cy', cy);
        pulse.setAttribute('r', '12');
        pulse.setAttribute('fill', 'none');
        pulse.setAttribute('stroke', 'rgba(112, 130, 56, 0.6)');
        pulse.setAttribute('stroke-width', '2');
        svgOverlay.appendChild(pulse);
        
        // Line (hidden by CSS) - now vertical to bottom
        const line = document.createElementNS(SVG_NS, 'line');
        line.setAttribute('id', 'line' + id);
        line.setAttribute('class', 'svg-line');
        line.setAttribute('x1', cx);
        line.setAttribute('y1', cy);
        line.setAttribute('x2', cx);
        line.setAttribute('y2', LINE_END_Y);
        line.setAttribute('stroke', '#708238');
        line.setAttribute('stroke-width', '2.5');
        line.setAttribute('stroke-dasharray', '10,5');
        svgOverlay.appendChild(line);
        
        // Dot
        const dot = document.createElementNS(SVG_NS, 'circle');
        dot.setAttribute('id', 'dot' + id);
        dot.setAttribute('class', 'svg-dot');
        dot.setAttribute('cx', cx);
        dot.setAttribute('cy', cy);
        dot.setAttribute('r', '9');
        dot.setAttribute('fill', '#708238');
        dot.setAttribute('stroke', '#fffff0');
        dot.setAttribute('stroke-width', '2.5');
        svgOverlay.appendChild(dot);
        
        // ---- Create Hotspot Div ----
        
        const hotspotDiv = document.createElement('div');
        hotspotDiv.className = 'hotspot';
        hotspotDiv.style.left = leftPct + '%';
        hotspotDiv.style.top = topPct + '%';
        hotspotDiv.style.width = widthPct + '%';
        hotspotDiv.style.height = heightPct + '%';
        hotspotDiv.dataset.popup = 'popup' + id;
        mapContainer.appendChild(hotspotDiv);
        
        // ---- Create Popup Div ----
        
        const popup = document.createElement('div');
        popup.className = 'schedule-popup';
        popup.id = 'popup' + id;
        
        const title = document.createElement('h3');
        title.textContent = hotspot.title;
        popup.appendChild(title);
        
        hotspot.schedule.forEach(item => {
            const p = document.createElement('p');
            p.textContent = item;
            popup.appendChild(p);
        });
        
        mapContainer.appendChild(popup);
        
        // ---- Add Event Listeners ----
        
        // Desktop hover
        hotspotDiv.addEventListener('mouseenter', function() {
            popup.classList.add('visible');
        });
        
        hotspotDiv.addEventListener('mouseleave', function() {
            popup.classList.remove('visible');
        });
        
        // Mobile touch support
        hotspotDiv.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Prevent mouse events from firing
            
            // Hide all other popups
            document.querySelectorAll('.schedule-popup').forEach(p => {
                if (p !== popup) {
                    p.classList.remove('visible');
                }
            });
            
            // Show this popup (no toggle, always show)
            popup.classList.add('visible');
        });
        
        // Click support (fallback for devices that don't support touch or hover well)
        hotspotDiv.addEventListener('click', function(e) {
            // Only handle if not a touch device (to avoid double-triggering)
            if (!e.touches) {
                document.querySelectorAll('.schedule-popup').forEach(p => {
                    if (p !== popup) {
                        p.classList.remove('visible');
                    }
                });
                popup.classList.add('visible');
            }
        });
    });
</script>

</body>
</html>
